# SonarQube analysis configuration for demoji
# Project key matches GitLab namespace: applications/demoji

sonar.projectKey=applications_demoji
sonar.projectName=demoji
sonar.projectDescription=CLI for scanning and sanitizing emoji usage in source files

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.language=ts
sonar.qualitygate.wait=true

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  .sonar/**,\
  **/.git/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/tests/fixtures/**
